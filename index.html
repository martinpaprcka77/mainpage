<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mainpage</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {--bg:#0f172a;--card:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#3b82f6;}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1000px;margin:0 auto;padding:40px 20px}
    header{display:flex;justify-content:space-between;margin-bottom:60px}
    nav a{margin-left:20px;color:var(--muted);text-decoration:none}
    .hero{text-align:center;margin-bottom:80px}
    .hero h1{font-size:48px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
    .card{background:var(--card);padding:20px;border-radius:12px}
    footer{text-align:center;margin-top:80px;color:var(--muted)}
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h3>mainpage</h3>
      <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Hello 👋</h1>
      <p>Modern UI ready</p>
    </section>

    <section class="grid">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
    </section>

    <footer>© 2026</footer>
  </div>
</body>
</html>
